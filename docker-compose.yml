services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: printforge
      POSTGRES_USER: printforge
      POSTGRES_PASSWORD: printforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CORS_ALLOW_ALL_ORIGINS: "True"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py sync_media_products &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - ./media:/media
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  celery:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: celery -A printforge worker -l info
    volumes:
      - ./backend:/app
      - ./media:/media
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
